name: Deploy legal pages

# Publishes the static site under site/ (Terms, Privacy, and the TikTok
# domain-verification page) to GitHub Pages. No build step — the folder is
# uploaded as-is.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run supersede an in-flight one, but never cancel a run mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
